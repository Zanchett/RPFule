appId: com.rpfule.app
productName: RPFule
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: RPFule
